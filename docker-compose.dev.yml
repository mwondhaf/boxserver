services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: boxserver
      POSTGRES_PASSWORD: boxserver
      POSTGRES_DB: boxserver
    ports:
      - "5432:5432"
    volumes:
      - pg_data_dev:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boxserver"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      target: deps
    # Entrypoint regenerates + applies migrations, then runs the dev server.
    entrypoint: ["sh", "/app/docker-entrypoint.sh"]
    command: ["npm", "run", "start:dev"]
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://boxserver:boxserver@db:5432/boxserver
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      # Dev convenience: regenerate migrations from schema changes on each boot.
      # Review the generated drizzle/00XX_*.sql before committing.
      DB_AUTO_GENERATE: "true"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Drizzle Studio. Profile-gated so it never starts with a plain `up`.
  # Launch with: docker compose -f docker-compose.dev.yml --profile studio up studio
  # Then open https://local.drizzle.studio (connects to localhost:4983).
  studio:
    build:
      context: .
      target: deps
    profiles: ["studio"]
    command: ["npx", "drizzle-kit", "studio", "--host", "0.0.0.0", "--port", "4983"]
    restart: unless-stopped
    ports:
      - "4983:4983"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://boxserver:boxserver@db:5432/boxserver
      NODE_ENV: development
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data_dev:
  redis_data_dev:
